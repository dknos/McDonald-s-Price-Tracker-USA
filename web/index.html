<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>St. Louis 100-Mile McDonald's Coverage Preview</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #222; }
    h1 { margin-bottom: 8px; }
    .meta { margin-bottom: 14px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    #plot { width: 100%; max-width: 820px; height: 820px; border: 1px solid #ddd; background: #fcfcfc; }
    .legend { display: flex; gap: 16px; margin-top: 8px; font-size: 14px; }
    .dot { width: 10px; height: 10px; border-radius: 999px; display: inline-block; margin-right: 6px; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Greater St. Louis McDonald's Coverage</h1>
  <div class="meta">Local browser preview of the configured <strong>100-mile radius</strong> and sampling points.</div>

  <div class="card">
    <div id="summary">Loading config...</div>
  </div>

  <svg id="plot" viewBox="0 0 820 820"></svg>
  <div class="legend">
    <div><span class="dot" style="background:#1f77b4"></span>Sampling points</div>
    <div><span class="dot" style="background:#d62728"></span>Center (St. Louis)</div>
    <div><span class="dot" style="background:#999"></span>100-mile boundary</div>
  </div>

  <div class="card">
    <strong>Run collector</strong>
    <p><code>python3 scripts/st_louis_price_tracker.py --config config/st_louis_100mi.json --outdir data</code></p>
  </div>

<script>
const EARTH_RADIUS_MI = 3958.7613;

function haversineMiles(lat1, lon1, lat2, lon2) {
  const p1 = lat1 * Math.PI / 180;
  const p2 = lat2 * Math.PI / 180;
  const dphi = (lat2 - lat1) * Math.PI / 180;
  const dlambda = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dphi / 2) ** 2 + Math.cos(p1) * Math.cos(p2) * Math.sin(dlambda / 2) ** 2;
  return 2 * EARTH_RADIUS_MI * Math.asin(Math.sqrt(a));
}

function circleSamplingPoints(centerLat, centerLng, radiusMiles, stepMiles) {
  const latDeltaPerMile = 1 / 69.0;
  const lngDeltaPerMile = 1 / (69.172 * Math.cos(centerLat * Math.PI / 180));

  const latMin = centerLat - radiusMiles * latDeltaPerMile;
  const latMax = centerLat + radiusMiles * latDeltaPerMile;
  const lngMin = centerLng - radiusMiles * lngDeltaPerMile;
  const lngMax = centerLng + radiusMiles * lngDeltaPerMile;

  const latStep = stepMiles * latDeltaPerMile;
  const lngStep = stepMiles * lngDeltaPerMile;

  const points = [];
  for (let lat = latMin; lat <= latMax + 1e-9; lat += latStep) {
    for (let lng = lngMin; lng <= lngMax + 1e-9; lng += lngStep) {
      if (haversineMiles(centerLat, centerLng, lat, lng) <= radiusMiles) {
        points.push([lat, lng]);
      }
    }
  }
  points.push([centerLat, centerLng]);
  return points;
}

function draw(centerLat, centerLng, radiusMiles, points) {
  const svg = document.getElementById('plot');
  svg.innerHTML = '';

  const size = 820;
  const pad = 30;
  const milesPerDegLat = 69.0;
  const milesPerDegLng = 69.172 * Math.cos(centerLat * Math.PI / 180);
  const degLatRadius = radiusMiles / milesPerDegLat;
  const degLngRadius = radiusMiles / milesPerDegLng;

  const latMin = centerLat - degLatRadius;
  const latMax = centerLat + degLatRadius;
  const lngMin = centerLng - degLngRadius;
  const lngMax = centerLng + degLngRadius;

  const sx = (size - 2 * pad) / (lngMax - lngMin);
  const sy = (size - 2 * pad) / (latMax - latMin);

  const project = (lat, lng) => {
    const x = pad + (lng - lngMin) * sx;
    const y = size - pad - (lat - latMin) * sy;
    return [x, y];
  };

  const [cx, cy] = project(centerLat, centerLng);

  const boundary = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  boundary.setAttribute('cx', cx);
  boundary.setAttribute('cy', cy);
  boundary.setAttribute('r', Math.min((size - 2 * pad) / 2, (size - 2 * pad) / 2));
  boundary.setAttribute('fill', 'none');
  boundary.setAttribute('stroke', '#999');
  boundary.setAttribute('stroke-width', '2');
  svg.appendChild(boundary);

  for (const [lat, lng] of points) {
    const [x, y] = project(lat, lng);
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', x);
    c.setAttribute('cy', y);
    c.setAttribute('r', '2.8');
    c.setAttribute('fill', '#1f77b4');
    svg.appendChild(c);
  }

  const center = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  center.setAttribute('cx', cx);
  center.setAttribute('cy', cy);
  center.setAttribute('r', '5');
  center.setAttribute('fill', '#d62728');
  svg.appendChild(center);
}

async function main() {
  const cfg = await fetch('../config/st_louis_100mi.json').then(r => r.json());
  const center = cfg.center;
  const radius = Number(cfg.radius_miles);
  const step = Number(cfg.sampling_step_miles || 15);
  const points = circleSamplingPoints(center.lat, center.lng, radius, step);
  document.getElementById('summary').innerHTML = `
    <strong>Region:</strong> ${cfg.region_name}<br>
    <strong>Center:</strong> ${center.name} (${center.lat}, ${center.lng})<br>
    <strong>Radius:</strong> ${radius} miles<br>
    <strong>Sampling step:</strong> ${step} miles<br>
    <strong>Sampling points:</strong> ${points.length}
  `;
  draw(center.lat, center.lng, radius, points);
}
main();
</script>
</body>
</html>
